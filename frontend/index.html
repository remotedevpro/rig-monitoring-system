<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Rig Monitoring Dashboard</title>
        <link rel="stylesheet" href="/frontend/style.css">  
        <link rel="icon" type="image/x-icon" href="/frontend/favicon.ico">
    </head>

    <body>

        <header>
            ⚙️ NURAB SYSTEMS — REAL-TIME RIG DASHBOARD
        </header>

        <div class="container">
            <div class="card">
                <div class="label">Depth</div>
                <div id="depth" class="value">0</div>
            </div>

            <div class="card">
                <div class="label">RPM</div>
                <div id="rpm" class="value">0</div>
            </div>

            <div class="card">
                <div class="label">Hookload</div>
                <div id="hookload" class="value">0</div>
            </div>

            <div class="card">
                <div class="label">Pressure</div>
                <div id="pressure" class="value">0</div>
            </div>
        </div>

        <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
        <script src="/frontend/script.js"></script>

    </body>
</html>
